<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REAL FINE</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Montserrat&display=swap" rel="stylesheet">

    <style>
        body{
            margin:0;
            background:#0a0c10;
            color:#fff;
            font-family:Montserrat;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            width:90%;
            max-width:420px;
            text-align:center;
        }

        .screen{display:none;}
        .active{display:block;}

        .home-banner{
            width:100%;
            border-radius:12px;
            margin-bottom:20px;
        }

        input{
            width:80%;
            padding:10px;
            background:none;
            border:none;
            border-bottom:1px solid #555;
            color:white;
        }

        button{
            margin-top:20px;
            padding:10px 20px;
            background:none;
            border:1px solid white;
            color:white;
            cursor:pointer;
        }

        .options button{
            display:block;
            width:100%;
            margin:10px 0;
            padding:12px;
        }

        #ticket{
            height:500px;
            background-size:cover;
            background-position:center;
            display:flex;
            align-items:flex-end;
            padding:20px;
            border-radius:15px;
        }
    </style>
</head>

<body>

<div class="container">

<!-- INTRO -->
<div id="intro" class="screen active">
    <img src="./images/main_image.jpg" class="home-banner">
    <h1>REAL FINE</h1>

    <input id="nameInput" placeholder="Tên của bạn">
    <br>
    <button onclick="next()">Bắt đầu</button>
</div>

<!-- QUIZ -->
<div id="quiz" class="screen">
    <div id="questionNo"></div>
    <h3 id="questionText"></h3>
    <div id="options" class="options"></div>
</div>

<!-- RESULT -->
<div id="result" class="screen">
    <div id="ticket">
        <div>
            <div id="resName"></div>
            <h2 id="resCinematic"></h2>
            <p id="resPoetic"></p>
        </div>
    </div>

    <button onclick="location.reload()">Làm lại</button>
</div>

</div>

<script>
const questions = [
    {q:"Âm thanh của bạn?",a:[{t:"Sóng",v:1},{t:"Lá",v:2},{t:"Gió",v:3}]},
    {q:"Màu cảm xúc?",a:[{t:"Trầm",v:1},{t:"Mờ",v:2},{t:"Sáng",v:3}]},
    {q:"Bạn muốn gì?",a:[{t:"Trốn",v:1},{t:"Ánh sáng",v:2},{t:"Bay",v:3}]}
];

const results = {
    3:{img:"./images/dark-green.jpg",c:"Tĩnh lặng",p:"Bạn cần nghỉ ngơi"},
    6:{img:"./images/lemon-yellow.jpg",c:"Hy vọng",p:"Bạn đang tốt dần"}
};

let step=0,score=0;

function next(){
    document.getElementById("intro").classList.remove("active");
    document.getElementById("quiz").classList.add("active");
    loadQ();
}

function loadQ(){
    if(step>=3) return showRes();

    document.getElementById("questionNo").innerText = `${step+1}/3`;
    document.getElementById("questionText").innerText = questions[step].q;

    let opt=document.getElementById("options");
    opt.innerHTML="";

    questions[step].a.forEach(ans=>{
        let b=document.createElement("button");
        b.innerText=ans.t;

        b.onclick=()=>{
            score+=ans.v;
            step++;
            loadQ();
        };

        opt.appendChild(b);
    });
}

function showRes(){
    document.getElementById("quiz").classList.remove("active");
    document.getElementById("result").classList.add("active");

    let res=results[score] || results[6];

    document.getElementById("resName").innerText =
        document.getElementById("nameInput").value;

    document.getElementById("resCinematic").innerText = res.c;
    document.getElementById("resPoetic").innerText = res.p;

    document.getElementById("ticket").style.backgroundImage =
        `url('${res.img}')`;
}
</script>

</body>
</html>
