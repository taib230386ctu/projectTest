<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REAL FINE - The Wandering Wings</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Montserrat&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            background: #0a0c10;
            color: white;
            font-family: Montserrat;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 420px;
            text-align: center;
        }

        .screen { display: none; }
        .active { display: block; }

        .home-banner {
            width: 100%;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        input {
            width: 80%;
            padding: 10px;
            border: none;
            border-bottom: 1px solid #555;
            background: transparent;
            color: white;
        }

        button {
            margin-top: 20px;
            padding: 10px 25px;
            background: transparent;
            border: 1px solid white;
            color: white;
            cursor: pointer;
        }

        .options button {
            display: block;
            width: 100%;
            margin: 10px 0;
            padding: 12px;
        }

        #ticket {
            height: 500px;
            border-radius: 15px;
            display: flex;
            align-items: flex-end;
            padding: 20px;
            background-size: cover;
            background-position: center;
        }
    </style>
</head>

<body>

<div class="container">

<!-- INTRO -->
<div id="intro" class="screen active">
    <img src="https://i.postimg.cc/9M7dWRs4/A-nh-ma-n-hi-nh-2026-04-12-lu-c-16-34-59.png" class="home-banner">
    
    <h1>REAL FINE</h1>
    <p>Ổn thật không?</p>

    <input id="nameInput" placeholder="Tên của bạn">
    <br>
    <button onclick="next()">Bắt đầu</button>
</div>

<!-- QUIZ -->
<div id="quiz" class="screen">
    <div id="questionNo"></div>
    <h3 id="questionText"></h3>
    <div id="options" class="options"></div>
</div>

<!-- RESULT -->
<div id="result" class="screen">
    <div id="ticket">
        <div>
            <div id="resName"></div>
            <h2 id="resCinematic"></h2>
            <p id="resPoetic"></p>
        </div>
    </div>

    <button onclick="location.reload()">Làm lại</button>
</div>

</div>

<script>
const questions = [
    {q:"Nếu cảm xúc là âm thanh?",a:[
        {t:"Sóng sâu",v:1},
        {t:"Lá rơi",v:2},
        {t:"Gió nhẹ",v:3}
    ]},
    {q:"Màu cảm xúc?",a:[
        {t:"Trầm",v:1},
        {t:"Mờ",v:2},
        {t:"Sáng",v:3}
    ]},
    {q:"Bạn muốn gì?",a:[
        {t:"Trốn",v:1},
        {t:"Ánh sáng",v:2},
        {t:"Bay",v:3}
    ]}
];

const results = {
    3:{
        img:"https://picsum.photos/400/700?1",
        c:"Tĩnh lặng",
        p:"Bạn cần nghỉ ngơi."
    },
    4:{
        img:"https://picsum.photos/400/700?2",
        c:"Sâu lắng",
        p:"Bạn đang ôm nhiều cảm xúc."
    },
    5:{
        img:"https://picsum.photos/400/700?3",
        c:"Chông chênh",
        p:"Bạn đang tìm lại cân bằng."
    },
    6:{
        img:"https://picsum.photos/400/700?4",
        c:"Ánh sáng",
        p:"Bạn đang dần ổn hơn."
    },
    7:{
        img:"https://picsum.photos/400/700?5",
        c:"Ấm áp",
        p:"Bạn đang hồi phục."
    },
    8:{
        img:"https://picsum.photos/400/700?6",
        c:"Bứt phá",
        p:"Bạn sẵn sàng bay cao."
    },
    9:{
        img:"https://picsum.photos/400/700?7",
        c:"Rực rỡ",
        p:"Bạn đang ở trạng thái tốt nhất."
    }
};

let step = 0;
let score = 0;
let name = "";

function next(){
    name = document.getElementById("nameInput").value || "Bạn";

    document.getElementById("intro").classList.remove("active");
    document.getElementById("quiz").classList.add("active");

    loadQ();
}

function loadQ(){
    if(step >= 3) return showRes();

    document.getElementById("questionNo").innerText = `${step+1}/3`;
    document.getElementById("questionText").innerText = questions[step].q;

    let opt = document.getElementById("options");
    opt.innerHTML = "";

    questions[step].a.forEach(ans=>{
        let b = document.createElement("button");
        b.innerText = ans.t;

        b.onclick = ()=>{
            score += ans.v;
            step++;
            loadQ();
        };

        opt.appendChild(b);
    });
}

function showRes(){
    document.getElementById("quiz").classList.remove("active");
    document.getElementById("result").classList.add("active");

    let res = results[score] || results[6];

    document.getElementById("resName").innerText = name;
    document.getElementById("resCinematic").innerText = res.c;
    document.getElementById("resPoetic").innerText = res.p;

    document.getElementById("ticket").style.backgroundImage =
        `url('${res.img}')`;
}
</script>

</body>
</html>
