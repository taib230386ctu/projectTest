<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REAL FINE - The Wandering Wings</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0c10;
            --accent-gold: #d4af37;
        }
        body {
            margin: 0; background-color: var(--bg-dark);
            color: #fff; font-family: 'Montserrat', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow: hidden;
        }
        .container { width: 100%; max-width: 450px; padding: 20px; text-align: center; }
        .screen { display: none; opacity: 0; transition: opacity 1.2s ease-in-out; }
        .active { display: block; opacity: 1; }
        
        /* Typography */
        h1 { font-family: 'Playfair Display', serif; letter-spacing: 4px; font-size: 32px; margin-bottom: 5px; }
        .sub-brand { font-size: 10px; letter-spacing: 3px; opacity: 0.6; margin-bottom: 30px; }
        
        /* Home Banner Image */
        .home-banner {
            width: 100%;
            max-width: 350px;
            border-radius: 15px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0, 168, 255, 0.15); /* Hiệu ứng tỏa sáng nhẹ màu xanh */
            display: block;
            margin-left: auto;
            margin-right: auto;
            transition: transform 0.5s ease;
        }
        .home-banner:hover {
            transform: scale(1.02);
        }

        /* Input & Buttons */
        input {
            background: transparent; border: none; border-bottom: 1px solid #444;
            color: #fff; width: 80%; padding: 10px; text-align: center;
            font-size: 18px; margin-bottom: 30px; outline: none; transition: 0.3s;
        }
        input:focus { border-bottom: 1px solid var(--accent-gold); }
        .btn {
            background: transparent; border: 1px solid #fff; color: #fff;
            padding: 12px 35px; cursor: pointer; font-size: 11px;
            letter-spacing: 2px; text-transform: uppercase; transition: 0.4s;
        }
        .btn:hover { background: #fff; color: #000; }

        /* Quiz Options */
        .options { display: flex; flex-direction: column; gap: 12px; margin-top: 25px; }
        .opt-btn {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1);
            color: #fff; padding: 16px; font-size: 13px; cursor: pointer; text-align: left;
            transition: 0.3s;
        }
        .opt-btn:hover { background: rgba(255,255,255,0.1); border-color: #fff; }

        /* Result Ticket (9:16) */
        #ticket {
            width: 100%; aspect-ratio: 9/16; border-radius: 20px;
            position: relative; overflow: hidden; display: flex;
            flex-direction: column; justify-content: flex-end;
            padding: 40px 25px; box-sizing: border-box;
            background-size: cover; background-position: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 10%, transparent 60%);
            z-index: 1;
        }
        .content { position: relative; z-index: 2; text-align: left; }
        .ticket-user { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; opacity: 0.8; margin-bottom: 15px; }
        .ticket-cinematic { font-family: 'Playfair Display', serif; font-size: 26px; line-height: 1.3; margin-bottom: 15px; }
        .ticket-poetic { font-size: 13px; line-height: 1.6; opacity: 0; transform: translateY(10px); transition: 1.5s ease 0.8s; }
        .show-text { opacity: 0.7 !important; transform: translateY(0) !important; }
    </style>
</head>
<body>

<div class="container">
    <div id="intro" class="screen active">
        <img src="pha-ken.jpg" alt="Phá Kén - The Wandering Wings" class="home-banner">
        
        <h1>REAL FINE</h1>
        <div class="sub-brand">ỔN THẬT KHÔNG?</div>
        <p style="font-size: 14px; font-weight: 300; margin-bottom: 30px;">Chào cậu, hãy để tâm hồn mình được "thở"<br>trong chiếc kén nhỏ này một chút.</p>
        <input type="text" id="nameInput" placeholder="Tên của cậu là...">
        <br>
        <button class="btn" onclick="next()">Bắt đầu hành trình</button>
    </div>

    <div id="quiz" class="screen">
        <div id="questionNo" style="font-size: 10px; letter-spacing: 2px; margin-bottom: 10px; opacity: 0.5;">01 / 03</div>
        <h2 id="questionText" style="font-family: 'Playfair Display', serif; font-weight: 400; font-size: 20px;"></h2>
        <div class="options" id="options"></div>
    </div>

    <div id="result" class="screen">
        <div id="ticket">
            <div class="overlay"></div>
            <div class="content">
                <div class="ticket-user">CỦA <span id="resName"></span> • THE WANDERING WINGS</div>
                <div class="ticket-cinematic" id="resCinematic"></div>
                <div id="resPoetic" class="ticket-poetic"></div>
            </div>
        </div>
        <button class="btn" style="margin-top: 25px;" onclick="location.reload()">Làm lại</button>
    </div>
</div>

<script>
    const questions = [
        { q: "Nếu nỗi lòng hiện tại là một thanh âm, đó sẽ là:", a: [{t: "Tiếng sóng ngầm dưới đáy sâu", v: 1}, {t: "Tiếng lá xào xạc rơi", v: 2}, {t: "Tiếng gió thổi qua khe cửa", v: 3}] },
        { q: "Bạn đang nhìn thế giới qua lăng kính màu gì?", a: [{t: "Một màu trầm lắng", v: 1}, {t: "Một màu trung tính, mờ ảo", v: 2}, {t: "Bắt đầu có những vệt sáng rực rỡ", v: 3}] },
        { q: "Bên trong chiếc kén của bạn, bạn muốn:", a: [{t: "Được bao bọc và trốn đi thêm chút nữa", v: 1}, {t: "Nhìn thấy một tia sáng lọt vào", v: 2}, {t: "Chuẩn bị vỗ cánh thênh thang", v: 3}] }
    ];

    const results = {
        3: { color: "Dark Green", img: "dark-green.jpg", c: "Khép lại xôn xao, trốn vào tĩnh lặng.", p: "Cậu được quyền mệt mỏi. Hãy mượn khoảng xanh thẳm này để rễ cắm sâu hơn trước khi đón bão." },
        4: { color: "Deep Sea Blue", img: "deep-sea-blue.jpg", c: "Chìm xuống đáy sâu, ôm lấy chính mình.", p: "Có những nỗi buồn trong vắt như đại dương. Đừng giấu đi, cứ để chúng được tự do vỗ sóng trong lòng cậu." },
        5: { color: "Teal", img: "teal.jpg", c: "Lưng chừng chông chênh, học cách xoa dịu.", p: "Không cần gồng mình vội vã. Giữa những ngổn ngang tuổi trẻ, sự bình yên vốn cần thời gian để thành hình." },
        6: { color: "Dotted White", img: "dotted-white.jpg", c: "Nơi bóng tối nứt vỡ, ánh sáng đi vào.", p: "Một chấm trắng nhỏ nhoi cũng đủ thắp lên bầu trời đêm. Lớp vỏ 'vẫn ổn' đang nhường chỗ cho những hy vọng thật thà nhất." },
        7: { color: "Lemon Yellow", img: "lemon-yellow.jpg", c: "Gói lại những cơn mưa, nhường chỗ cho nắng.", p: "Đủ sự dịu dàng và ấm áp, lớp kén kiên cố nhất cũng sẽ tự khắc mềm ra. Phần đời rực rỡ của cậu bắt đầu rồi." },
        8: { color: "Sunset Orange", img: "sunset-orange.jpg", c: "Trọn vẹn dũng khí, dang cánh thênh thang.", p: "Bầu trời rực rỡ nhất là phần thưởng cho những nỗ lực thầm lặng. Cậu đã sẵn sàng bay bằng đôi cánh của chính mình." },
        9: { color: "Sunset Orange", img: "sunset-orange.jpg", c: "Trọn vẹn dũng khí, dang cánh thênh thang.", p: "Bầu trời rực rỡ nhất là phần thưởng cho những nỗ lực thầm lặng. Cậu đã sẵn sàng bay bằng đôi cánh của chính mình." }
    };

    let step = 0, score = 0, uName = "";

    function next() {
        uName = document.getElementById('nameInput').value || "Người bạn";
        document.getElementById('intro').classList.remove('active');
        setTimeout(() => { document.getElementById('quiz').classList.add('active'); loadQ(); }, 600);
    }

    function loadQ() {
        if(step >= 3) return showRes();
        document.getElementById('questionNo').innerText = `0${step+1} / 03`;
        document.getElementById('questionText').innerText = questions[step].q;
        const opts = document.getElementById('options');
        opts.innerHTML = '';
        questions[step].a.forEach(ans => {
            const b = document.createElement('button');
            b.className = 'opt-btn';
            b.innerText = ans.t;
            b.onclick = () => { score += ans.v; step++; loadQ(); };
            opts.appendChild(b);
        });
    }

    function showRes() {
        document.getElementById('quiz').classList.remove('active');
        const res = results[score] || results[6];
        document.getElementById('resName').innerText = uName;
        document.getElementById('resCinematic').innerText = res.c;
        document.getElementById('resPoetic').innerText = res.p;
        document.getElementById('ticket').style.backgroundImage = `url('${res.img}')`;
        
        setTimeout(() => { 
            document.getElementById('result').classList.add('active');
            setTimeout(() => { document.getElementById('resPoetic').classList.add('show-text'); }, 1000);
        }, 600);
    }
</script>
</body>
</html>
<img src="https://i.postimg.cc/9M7dWRs4/A-nh-ma-n-hi-nh-2026-04-12-lu-c-16-34-59.png" alt="Phá Kén - The Wandering Wings" class="home-banner">
