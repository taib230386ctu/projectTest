<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REAL FINE - Trạm Hóa Bướm</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d1117; /* Dark cinematic background */
            --text-main: #f0f0f0;
        }
        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            overflow: hidden;
        }
        h1, h2, .cinematic-text {
            font-family: 'Playfair Display', serif;
            font-weight: 400;
        }
        .container {
            width: 100%; max-width: 400px; padding: 20px;
        }
        .screen {
            display: none;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }
        .screen.active {
            display: block;
            opacity: 1;
        }
        input[type="text"] {
            background: transparent;
            border: none;
            border-bottom: 1px solid #555;
            color: white;
            font-family: 'Montserrat', sans-serif;
            font-size: 16px;
            padding: 10px;
            text-align: center;
            width: 80%;
            margin-bottom: 30px;
            outline: none;
        }
        input[type="text"]:focus { border-bottom: 1px solid #fff; }
        .btn {
            background: transparent;
            border: 1px solid #fff;
            color: #fff;
            padding: 12px 30px;
            font-family: 'Montserrat', sans-serif;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover { background: #fff; color: #000; }
        .options { display: flex; flex-direction: column; gap: 15px; margin-top: 30px; }
        .option-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 15px;
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .option-btn:hover { background: rgba(255,255,255,0.15); }
        
        /* Ticket Design */
        #ticket-card {
            background: #111;
            border-radius: 15px;
            padding: 40px 20px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            position: relative;
            overflow: hidden;
            transition: box-shadow 2s ease;
            aspect-ratio: 9/16;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .glow {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.15; z-index: 0;
        }
        .ticket-content { position: relative; z-index: 1; }
        .user-name-display { font-size: 12px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 30px; opacity: 0.7;}
        .cinematic-msg { font-size: 24px; line-height: 1.4; margin-bottom: 20px; }
        .poetic-msg { font-size: 13px; line-height: 1.6; opacity: 0; transition: opacity 2s ease 1s; }
        .poetic-msg.show { opacity: 0.8; }
    </style>
</head>
<body>

<div class="container">
    <div id="screen-intro" class="screen active">
        <h1 style="font-size: 28px; margin-bottom: 10px; letter-spacing: 2px;">REAL FINE</h1>
        <p style="font-size: 12px; letter-spacing: 1px; opacity: 0.6; margin-bottom: 50px;">ỔN THẬT KHÔNG?</p>
        <h2 style="font-size: 18px; margin-bottom: 40px;">Dừng lại một chút, tên cậu là gì?</h2>
        <input type="text" id="userName" placeholder="Nhập tên của cậu...">
        <br>
        <button class="btn" onclick="startQuiz()">Bắt đầu bước vào kén</button>
    </div>

    <div id="screen-quiz" class="screen">
        <h2 id="question-text" style="font-size: 20px; line-height: 1.5;">Question</h2>
        <div class="options" id="options-container">
            </div>
    </div>

    <div id="screen-result" class="screen">
        <div id="ticket-card">
            <div class="glow" id="ticket-glow"></div>
            <div class="ticket-content">
                <div class="user-name-display">Kén của <span id="display-name"></span></div>
                <div class="cinematic-text cinematic-msg" id="msg-cinematic"></div>
                <div class="poetic-msg" id="msg-poetic"></div>
            </div>
        </div>
        <button class="btn" style="margin-top: 30px;" onclick="location.reload()">Thử lại</button>
    </div>
</div>

<script>
    // Data cho câu hỏi
    const questions = [
        {
            text: "Nếu nỗi lòng hiện tại là một thanh âm, đó sẽ là:",
            answers: [
                { text: "A. Tiếng sóng ngầm dưới đáy sâu", value: 1 },
                { text: "B. Tiếng lá xào xạc rơi", value: 2 },
                { text: "C. Tiếng gió thổi qua khe cửa", value: 3 }
            ]
        },
        {
            text: "Bạn đang nhìn thế giới qua lăng kính màu gì?",
            answers: [
                { text: "A. Một màu trầm lắng", value: 1 },
                { text: "B. Một màu trung tính, mờ ảo", value: 2 },
                { text: "C. Bắt đầu có những vệt sáng rực rỡ", value: 3 }
            ]
        },
        {
            text: "Bên trong chiếc kén của bạn, bạn muốn:",
            answers: [
                { text: "A. Được bao bọc và trốn đi thêm chút nữa", value: 1 },
                { text: "B. Nhìn thấy một tia sáng lọt vào", value: 2 },
                { text: "C. Chuẩn bị vỗ cánh thênh thang", value: 3 }
            ]
        }
    ];

    // Data cho 6 màu kết quả
    const resultsData = {
        3: { color: "#006400", hex: "Dark Green", cinematic: "Khép lại xôn xao,<br>trốn vào tĩnh lặng.", poetic: "Cậu được quyền mệt mỏi. Hãy mượn khoảng xanh thẳm này để rễ cắm sâu hơn trước khi đón bão." },
        4: { color: "#00008B", hex: "Deep Sea Blue", cinematic: "Chìm xuống đáy sâu,<br>ôm lấy chính mình.", poetic: "Có những nỗi buồn trong vắt như đại dương. Đừng giấu đi, cứ để chúng được tự do vỗ sóng trong lòng cậu." },
        5: { color: "#008080", hex: "Teal", cinematic: "Lưng chừng chông chênh,<br>học cách xoa dịu.", poetic: "Không cần gồng mình vội vã. Giữa những ngổn ngang tuổi trẻ, sự bình yên vốn cần thời gian để thành hình." },
        6: { color: "#E0E0E0", hex: "Dotted White", cinematic: "Nơi bóng tối nứt vỡ,<br>ánh sáng đi vào.", poetic: "Một chấm trắng nhỏ nhoi cũng đủ thắp lên bầu trời đêm. Lớp vỏ 'vẫn ổn' đang nhường chỗ cho những hy vọng thật thà nhất." },
        7: { color: "#FFF44F", hex: "Lemon Yellow", cinematic: "Gói lại những cơn mưa,<br>nhường chỗ cho nắng.", poetic: "Đủ sự dịu dàng và ấm áp, lớp kén kiên cố nhất cũng sẽ tự khắc mềm ra. Phần đời rực rỡ của cậu bắt đầu rồi." },
        8: { color: "#FD5E53", hex: "Sunset Orange", cinematic: "Trọn vẹn dũng khí,<br>dang cánh thênh thang.", poetic: "Bầu trời rực rỡ nhất là phần thưởng cho những nỗ lực thầm lặng. Không còn chắp vá, cậu đã sẵn sàng bay bằng đôi cánh nguyên vẹn." },
        9: { color: "#FD5E53", hex: "Sunset Orange", cinematic: "Trọn vẹn dũng khí,<br>dang cánh thênh thang.", poetic: "Bầu trời rực rỡ nhất là phần thưởng cho những nỗ lực thầm lặng. Không còn chắp vá, cậu đã sẵn sàng bay bằng đôi cánh nguyên vẹn." }
    };

    let currentStep = 0;
    let score = 0;
    let userName = "";

    function switchScreen(hideId, showId) {
        document.getElementById(hideId).classList.remove('active');
        setTimeout(() => {
            document.getElementById(showId).classList.add('active');
        }, 800); // Cinematic fade delay
    }

    function startQuiz() {
        const inputName = document.getElementById('userName').value.trim();
        userName = inputName ? inputName : "Cậu";
        switchScreen('screen-intro', 'screen-quiz');
        loadQuestion();
    }

    function loadQuestion() {
        if (currentStep >= questions.length) {
            showResult();
            return;
        }
        
        const q = questions[currentStep];
        const qText = document.getElementById('question-text');
        const optContainer = document.getElementById('options-container');
        
        // Fade out old text
        qText.style.opacity = 0;
        optContainer.style.opacity = 0;

        setTimeout(() => {
            qText.innerHTML = q.text;
            optContainer.innerHTML = '';
            q.answers.forEach(ans => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerHTML = ans.text;
                btn.onclick = () => selectAnswer(ans.value);
                optContainer.appendChild(btn);
            });
            // Fade in new text
            qText.style.opacity = 1;
            optContainer.style.opacity = 1;
        }, 500);
    }

    function selectAnswer(val) {
        score += val;
        currentStep++;
        loadQuestion();
    }

    function showResult() {
        switchScreen('screen-quiz', 'screen-result');
        
        document.getElementById('display-name').innerText = userName;
        
        // Lấy kết quả dựa trên tổng điểm (score từ 3 đến 9)
        const result = resultsData[score] || resultsData[6]; 
        
        document.getElementById('msg-cinematic').innerHTML = result.cinematic;
        document.getElementById('msg-poetic').innerHTML = result.poetic;
        
        // Đổi màu sắc ánh sáng của vé
        const ticket = document.getElementById('ticket-card');
        const glow = document.getElementById('ticket-glow');
        glow.style.background = `radial-gradient(circle at center, ${result.color} 0%, transparent 70%)`;
        ticket.style.boxShadow = `0 0 40px ${result.color}40`; // 40 là mã hex cho độ trong suốt 25%

        // Cinematic text reveal
        setTimeout(() => {
            document.getElementById('msg-poetic').classList.add('show');
        }, 1500);
    }
</script>

</body>
</html>
