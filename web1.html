<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REAL FINE | Ổn Thiệt Không?</title>
    <style>
        body {
            background-color: #121212; /* Nền tối Dark Mode */
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }
        header {
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #333;
        }
        .logo { font-weight: bold; font-size: 1.2rem; letter-spacing: 2px;}
        .hero {
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            /* Thay link ảnh dưới đây bằng ảnh chụp tại TDTU của bạn */
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)), url('https://images.unsplash.com/photo-1555626906-fcf10d6851b4?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') center/cover;
        }
        h1 {
            font-size: 5rem;
            color: #ff9800; /* Màu cam phát sáng */
            text-shadow: 0 0 20px #ff9800;
            margin: 0;
        }
        p.subtitle {
            font-size: 1.5rem;
            color: #ccc;
            margin-top: 10px;
        }
        .btn {
            margin-top: 30px;
            padding: 15px 30px;
            background-color: transparent;
            border: 2px solid #ff9800;
            color: #ff9800;
            font-size: 1.2rem;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.3s;
        }
        .btn:hover {
            background-color: #ff9800;
            color: #121212;
            box-shadow: 0 0 15px #ff9800;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">REAL FINE</div>
        <nav>Trang chủ &nbsp;|&nbsp; Kể Đi &nbsp;|&nbsp; Thư 3 Năm Sau</nav>
    </header>
    <section class="hero">
        <h1>ỔN THIỆT KHÔNG?</h1>
        <p class="subtitle">Lời hỏi thăm xã giao. Ổn thật không?</p>
        <button class="btn">Kể Đi, Nghe Nè</button>
    </section>
</body>
</html>
